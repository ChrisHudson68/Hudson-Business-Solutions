services:
  web:
    build: .
    container_name: hudson_business_solutions_web
    restart: always
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/data
      - DB_PATH=/data/database.db
    ports:
      - "5555:5555"
    volumes:
      - hudson_business_solutions_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5555/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

volumes:
  hudson_business_solutions_data:
    name: hudson_business_solutions_data